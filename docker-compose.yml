name: meditrack-reminder

services:
  mysql:
    image: mysql:8.0
    container_name: meditrack-reminder-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: meditrack_reminder
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3-management
    container_name: meditrack-reminder-rabbitmq
    ports:
      - "5672:5672"     # protocolo AMQP
      - "15672:15672"   # consola de administración
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  reminder-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: meditrack-reminder-service
    depends_on:
      mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__ReminderDb: "Server=mysql;Port=3306;Database=meditrack_reminder;User=root;Password=root;"
      Database__AutoMigrate: "true"
      Swagger__Enabled: "true"
      RabbitMq__Host: "rabbitmq"
      RabbitMq__Port: "5672"
      RabbitMq__UserName: "guest"
      RabbitMq__Password: "guest"
      Jwt__Issuer: "meditrack-gateway"
      Jwt__Audience: "meditrack-services"
      # docker-compose sustituye ${JWT_KEY} desde un archivo .env local (no
      # commiteado) o una variable de entorno del shell -- nunca hardcodeado acá.
      Jwt__Key: "${JWT_KEY:?falta JWT_KEY -- ver README}"
      # Igual que JWT_KEY: nada de credenciales reales hardcodeadas acá.
      # Por defecto SimulateDelivery=false (push real) -- se puede forzar a
      # "true" seteando FCM_SIMULATE_DELIVERY si todavía no tenés credenciales.
      Fcm__SimulateDelivery: "${FCM_SIMULATE_DELIVERY:-false}"
      Fcm__ProjectId: "${FCM_PROJECT_ID:?falta FCM_PROJECT_ID -- ver README}"
      Fcm__CredentialsPath: "/app/firebase-credentials.json"
    volumes:
      - ${FCM_CREDENTIALS_HOST_PATH:?falta FCM_CREDENTIALS_HOST_PATH -- ver README}:/app/firebase-credentials.json:ro
    ports:
      - "8080:8080"

volumes:
  mysql-data:
